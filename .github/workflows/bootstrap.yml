name: Bootstrap scaffold

on:
  push:
    branches:
      - chore/initial-project-scaffold
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip bootstrap]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: chore/initial-project-scaffold

      - name: Restore scaffold
        shell: bash
        run: |
          cat bootstrap/scaffold.part.* > /tmp/notifyhub-scaffold.b64
          base64 --decode /tmp/notifyhub-scaffold.b64 > /tmp/notifyhub-scaffold.tar.gz
          tar -xzf /tmp/notifyhub-scaffold.tar.gz -C .
          rm -rf bootstrap .github/workflows/bootstrap.yml

      - name: Commit scaffold
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: scaffold NotifyHub [skip bootstrap]"
          git push
